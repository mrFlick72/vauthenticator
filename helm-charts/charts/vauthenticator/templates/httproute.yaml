{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "vauthenticator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vauthenticator.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if gt (len .Values.gateway.parentRefs) 0 }}
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- else }}
  {{- fail "gateway.parentRefs must contain at least one Gateway reference when gateway.enabled is true" }}
  {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if gt (len .Values.gateway.rules) 0 }}
    {{- toYaml .Values.gateway.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "vauthenticator.name" . }}
          port: {{ .Values.application.server.port }}
    {{- end }}
{{- end }}
